---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.20.0.10:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.20.0.10"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "talos-01"
    ipAddress: "10.20.0.31"
    installDiskSelector:
      serial: "26030243611002254"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:37:a7:93"
        dhcp: false
        addresses:
          - "10.20.0.31/24"
        routes:
          - gateway: "10.20.0.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.20.0.10"
      - deviceSelector:
          hardwareAddr: "38:05:25:37:a7:90"
        dhcp: false
        addresses:
          - "10.100.0.31/24"
        mtu: 9000
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: i915
  - hostname: "talos-02"
    ipAddress: "10.20.0.32"
    installDiskSelector:
      serial: "26030243611002374"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:37:a7:af"
        dhcp: false
        addresses:
          - "10.20.0.32/24"
        routes:
          - gateway: "10.20.0.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.20.0.10"
      - deviceSelector:
          hardwareAddr: "38:05:25:37:a7:ac"
        dhcp: false
        addresses:
          - "10.100.0.32/24"
        mtu: 9000
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: i915
  - hostname: "talos-03"
    ipAddress: "10.20.0.33"
    installDiskSelector:
      serial: "S4EVNF0M473268F"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "04:92:26:d5:6b:2e"
        dhcp: false
        addresses:
          - "10.20.0.33/24"
        routes:
          - gateway: "10.20.0.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.20.0.10"
      - deviceSelector:
          hardwareAddr: "c4:62:37:09:9e:34"
        dhcp: false
        addresses:
          - "10.100.0.33/24"
        mtu: 9000
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: i915

# Global patches
patches:
  - "@./patches/global/machine-features.yaml"
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

